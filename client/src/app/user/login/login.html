<div class="w-full max-w-md mx-auto h-full flex flex-col justify-center animate-fade-in-up">
  <!-- Header -->
  <div class="mb-8 text-center md:text-left">
    <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight">Welcome back</h2>
    <p class="text-slate-500 dark:text-slate-400 mt-2">Log in to your account and securely access your dashboard.</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
    
    <!-- Email Field -->
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-slate-400 group-focus-within:text-emerald-500 transition-colors duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
      </div>
      <input
        type="email"
        placeholder="Contact Email Address"
        formControlName="email"
        class="block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 focus:bg-white transition-all duration-300 dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder-slate-500"
      />
    </div>

    <!-- Password Field -->
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-slate-400 group-focus-within:text-emerald-500 transition-colors duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <input
        type="password"
        placeholder="Password"
        formControlName="password"
        class="block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 focus:bg-white transition-all duration-300 dark:bg-slate-800 dark:border-slate-700 dark:text-white dark:placeholder-slate-500"
      />
    </div>

    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center text-slate-600 dark:text-slate-400 cursor-pointer">
        <input type="checkbox" class="rounded border-slate-300 text-emerald-600 focus:ring-emerald-500 form-checkbox h-4 w-4 transition duration-150 ease-in-out" />
        <span class="ml-2">Remember me</span>
      </label>
      <a href="#" class="text-emerald-600 hover:text-emerald-500 font-medium transition-colors">Forgot password?</a>
    </div>

    <!-- Submit Button -->
    <div class="pt-2">
      <button
        type="submit"
        class="w-full relative flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-emerald-600 hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 shadow-lg shadow-emerald-500/30 transition-all duration-300 transform active:scale-[0.98]"
      >
        Sign in to your account
      </button>
    </div>
  </form>

  <div class="mt-8">
    <div class="relative">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white dark:bg-slate-900 text-slate-500">Or continue with</span>
      </div>
    </div>

    <div class="mt-6 grid grid-cols-2 gap-3">
      <button class="w-full inline-flex justify-center py-2.5 px-4 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-700 shadow-sm transition-colors dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-700">
        <!-- SVG for Google -->
        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="w-full inline-flex justify-center py-2.5 px-4 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-700 shadow-sm transition-colors dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-700">
        <!-- SVG for GitHub -->
        <svg fill="currentColor" viewBox="0 0 24 24" class="h-5 w-5 mr-2 text-slate-800 dark:text-white">
          <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
        </svg>
        GitHub
      </button>
    </div>
  </div>

  <p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
    Don't have an account?
    <a routerLink="/register" class="font-semibold text-emerald-600 hover:text-emerald-500 transition-colors">Sign up for free</a>
  </p>
</div>
